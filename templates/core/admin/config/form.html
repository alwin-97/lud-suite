{% extends 'core/admin/base_admin.html' %}

{% block title %}Edit {{ title }}{% endblock %}

{% block breadcrumb %}
<nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="{% url 'admin_dashboard' %}"><i class="fa-solid fa-house fa-sm me-1"></i>Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{% url 'admin_config_home' %}">Config</a></li>
    <li class="breadcrumb-item"><a href="{% url 'admin_config_list' config_key %}">{{ title }}</a></li>
    <li class="breadcrumb-item active">Edit</li>
</ol></nav>
{% endblock %}

{% block page_content %}
<div class="page-header"><h1>Edit {{ title }}</h1></div>

<div class="panel" style="max-width:640px">
    <div class="panel-body admin-form">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-sm btn-primary"><i class="fa-solid fa-check me-1"></i>Save</button>
                <a class="btn btn-sm btn-outline-secondary" href="{% url 'admin_config_list' config_key %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
