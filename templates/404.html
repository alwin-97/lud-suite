<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LUD Suite | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            font-family:'Outfit',sans-serif;color:#0f172a;
            background:
                radial-gradient(circle at top left,rgba(244,226,199,.95),transparent 34%),
                radial-gradient(circle at bottom right,rgba(214,239,224,.85),transparent 28%),
                linear-gradient(135deg,#f7f3ec 0%,#f3f7f3 50%,#eef5f2 100%);
        }
        .error-card{
            text-align:center;max-width:480px;padding:3rem 2.5rem;
            background:rgba(255,255,255,.88);border-radius:24px;
            box-shadow:0 8px 40px rgba(8,59,53,.08);border:1px solid rgba(15,23,42,.06);
        }
        .error-icon{
            width:72px;height:72px;border-radius:50%;margin:0 auto 1.5rem;
            display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#d6efe0,#b4dfc6);color:#0b5d52;font-size:1.75rem;font-weight:700;
        }
        .error-code{font-size:4.5rem;font-weight:700;color:#083b35;line-height:1;margin-bottom:.25rem}
        .error-title{font-size:1.35rem;font-weight:600;color:#0b5d52;margin-bottom:.75rem}
        .error-desc{font-size:.95rem;color:#5b6475;line-height:1.6;margin-bottom:2rem}
        .error-btn{
            display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;
            background:linear-gradient(135deg,#0b5d52,#083b35);color:#fff;
            border:none;border-radius:12px;font-family:inherit;font-size:.95rem;font-weight:500;
            text-decoration:none;transition:transform .15s,box-shadow .15s;cursor:pointer;
        }
        .error-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(8,59,53,.25);color:#fff}
        .error-brand{margin-top:2rem;font-size:.8rem;color:#94a3b8;font-weight:400}
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <p class="error-desc">
            The page you're looking for doesn't exist or has been moved.
            Check the URL or head back to the home page.
        </p>
        <a href="/" class="error-btn">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
            </svg>
            Back to Home
        </a>
        <div class="error-brand">Let Us Dream &middot; Application Suite</div>
    </div>
</body>
</html>
